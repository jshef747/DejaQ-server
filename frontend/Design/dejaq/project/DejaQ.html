<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DejaQ — semantic cache for LLM apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="pages-crud.jsx"></script>
<script type="text/babel" src="pages-tree.jsx"></script>
<script type="text/babel" src="pages-depts-focused.jsx"></script>
<script type="text/babel" src="pages-auth.jsx"></script>
<script type="text/babel" src="pages-analytics.jsx"></script>
<script type="text/babel" src="pages-chat.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#f97316",
  "density": "compact",
  "showInspectorPulse": true
}/*EDITMODE-END*/;

function App() {
  // Auth state
  const [authUser, setAuthUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dejaq.user') || 'null'); } catch { return null; }
  });
  const [onboardingDone, setOnboardingDone] = useState(() => localStorage.getItem('dejaq.onboarded') === '1');

  const [page, _setPage] = useState(() => localStorage.getItem('dejaq.page') || 'analytics');
  const setPage = (p) => { _setPage(p); localStorage.setItem('dejaq.page', p); };

  const [orgs, setOrgs] = useState(ORGS);
  const [org, setOrg]   = useState(ORGS[0]);
  const [depts, setDepts] = useState(DEPARTMENTS);
  const [keys, setKeys]   = useState(API_KEYS);
  const [showOrgMenu, setShowOrgMenu] = useState(false);

  const handleAuth = (u) => {
    setAuthUser(u);
    localStorage.setItem('dejaq.user', JSON.stringify(u));
    // New accounts go through onboarding; existing users skip it
    if (!u.isNew && !onboardingDone) {
      setOnboardingDone(true);
      localStorage.setItem('dejaq.onboarded', '1');
    }
  };
  const handleOnboardDone = (data) => {
    if (data && data.orgName) {
      const id = 'org_' + data.orgName.toLowerCase().replace(/[^a-z0-9]+/g, '').slice(0, 14);
      const today = new Date().toISOString().slice(0, 10);
      const newOrg = { id, name: data.orgName, createdAt: today, members: 1 };
      setOrgs([newOrg, ...orgs]);
      setOrg(newOrg);
      const deptId = 'dept_' + Math.random().toString(36).slice(2, 8);
      setDepts({ ...depts, [id]: [{ id: deptId, name: data.deptName || 'general', hits: 0, misses: 0, createdAt: today }] });
      if (data.apiKey) {
        const [prefix, , suffix] = [data.apiKey.slice(0, 12), '', data.apiKey.slice(-4)];
        setKeys([{ id: 'k_new', prefix, suffix, orgId: id, createdAt: today, lastUsed: today, env: 'production' }, ...keys]);
      }
    }
    setOnboardingDone(true);
    localStorage.setItem('dejaq.onboarded', '1');
    setPage('analytics');
  };
  const signOut = () => {
    localStorage.removeItem('dejaq.user');
    localStorage.removeItem('dejaq.onboarded');
    setAuthUser(null);
    setOnboardingDone(false);
  };

  // Tweaks
  const [tweaks, setTweaks] = useState(TWEAKS_DEFAULTS);
  const [tweaksOn, setTweaksOn] = useState(false);
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOn(true);
      else if (d.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, [tweaks.accent]);
  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  // Ensure selected org is still in orgs
  useEffect(() => {
    if (!orgs.find(o => o.id === org.id)) setOrg(orgs[0]);
  }, [orgs]);

  // Gate: auth → onboarding → app
  if (!authUser) {
    return (
      <>
        <AuthScreen onAuth={handleAuth} />
        {tweaksOn && <TweaksPanel tweaks={tweaks} setTweak={setTweak} page="auth" setPage={() => {}} jump={(target) => {
          if (target === 'app') {
            const u = { email: 'demo@dejaq.dev', name: 'Demo', isNew: false };
            setAuthUser(u);
            localStorage.setItem('dejaq.user', JSON.stringify(u));
            setOnboardingDone(true);
            localStorage.setItem('dejaq.onboarded', '1');
          } else if (target === 'onboarding') {
            const u = { email: 'demo@dejaq.dev', name: 'Demo', isNew: true };
            setAuthUser(u);
            localStorage.setItem('dejaq.user', JSON.stringify(u));
          }
        }} />}
      </>
    );
  }
  if (!onboardingDone) {
    return (
      <>
        <Onboarding user={authUser} onDone={handleOnboardDone} />
        {tweaksOn && <TweaksPanel tweaks={tweaks} setTweak={setTweak} page="onboarding" setPage={() => {}} jump={(target) => {
          if (target === 'app') { setOnboardingDone(true); localStorage.setItem('dejaq.onboarded','1'); }
          else if (target === 'auth') { signOut(); }
        }} />}
      </>
    );
  }

  let content;
  switch (page) {
    case 'analytics':     content = <AnalyticsPage org={org} depts={depts} />; break;
    case 'organizations': content = <OrgTreePage orgs={orgs} setOrgs={setOrgs} depts={depts} setDepts={setDepts} setOrg={setOrg} />; break;
    case 'departments':   content = <DepartmentsFocusedPage org={org} orgs={orgs} setOrg={setOrg} depts={depts} setDepts={setDepts} />; break;
    case 'keys':          content = <KeysPage keys={keys} setKeys={setKeys} orgs={orgs} />; break;
    case 'chat':          content = <ChatPage org={org} />; break;
    case 'settings':      content = <SettingsPage org={org} orgs={orgs} setOrgs={setOrgs} setOrg={setOrg} setPage={setPage} />; break;
    default:              content = <div className="page">Not found</div>;
  }

  const isChat = page === 'chat';

  return (
    <div className="app" data-screen-label={page}>
      <Sidebar page={page} setPage={setPage} org={org} setOrg={setOrg} orgs={orgs}
               showOrgMenu={showOrgMenu} setShowOrgMenu={setShowOrgMenu}
               user={authUser} onSignOut={signOut} />
      <div className="main">
        <Topbar page={page} org={org} />
        <div style={isChat ? { flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' } : {}}>
          {content}
        </div>
      </div>

      {tweaksOn && <TweaksPanel tweaks={tweaks} setTweak={setTweak} page={page} setPage={setPage} jump={(target) => {
        if (target === 'auth') signOut();
        else if (target === 'onboarding') { setOnboardingDone(false); localStorage.removeItem('dejaq.onboarded'); }
      }} />}
    </div>
  );
}

function TweaksPanel({ tweaks, setTweak, page, setPage, jump }) {
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, width: 280,
      background: '#1e1e1e', border: '1px solid var(--border-2)', borderRadius: 8,
      boxShadow: '0 8px 32px rgba(0,0,0,0.5)', zIndex: 200, overflow: 'hidden'
    }}>
      <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--border)', fontSize: 12, fontWeight: 500, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        Tweaks
        <span className="mono dimmer" style={{ fontSize: 10 }}>live</span>
      </div>
      <div style={{ padding: '12px 14px' }}>
        <div className="field">
          <label className="field-label">Accent color</label>
          <div style={{ display: 'flex', gap: 6 }}>
            {['#f97316', '#10b981', '#3b82f6', '#a855f7', '#ef4444', '#eab308'].map(c => (
              <button key={c} onClick={() => setTweak('accent', c)}
                style={{
                  width: 22, height: 22, borderRadius: 4, background: c,
                  border: tweaks.accent === c ? '2px solid #fff' : '1px solid var(--border-2)',
                  cursor: 'pointer', padding: 0
                }} />
            ))}
          </div>
        </div>
        <div className="field">
          <label className="field-label">Jump to flow</label>
          <div style={{ display: 'flex', gap: 4 }}>
            <button className="btn btn-xs" style={{ flex: 1, justifyContent: 'center' }} onClick={() => jump('auth')}>Auth</button>
            <button className="btn btn-xs" style={{ flex: 1, justifyContent: 'center' }} onClick={() => jump('onboarding')}>Onboarding</button>
            <button className="btn btn-xs" style={{ flex: 1, justifyContent: 'center' }} onClick={() => jump('app')}>App</button>
          </div>
        </div>
        <div className="field" style={{ marginBottom: 0 }}>
          <label className="field-label">Go to page</label>
          <select className="select" value={page} onChange={e => setPage(e.target.value)}>
            <option value="analytics">Analytics</option>
            <option value="organizations">Organizations</option>
            <option value="departments">Departments</option>
            <option value="keys">API Keys</option>
            <option value="chat">Chat demo</option>
            <option value="settings">Settings</option>
          </select>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
